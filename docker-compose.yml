services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: source_sql_server
    user: root
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "RakaminDE_2026"
    ports:
      - "1433:1433"
    volumes:
      - ./data_source:/var/opt/mssql/backup
      - sqlserver_data:/var/opt/mssql/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'RakaminDE_2026' -C -Q 'SELECT 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

volumes:
  sqlserver_data: